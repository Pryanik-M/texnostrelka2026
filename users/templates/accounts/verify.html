{% load static %}

<h2>Подтверждение</h2>

{% if not code_sent %}
    <form method="post">
        {% csrf_token %}
        <p>Нажмите кнопку, чтобы отправить код на почту.</p>
        <button type="submit" name="action" value="send">Отправить код</button>
    </form>
{% else %}
    <form id="verifyForm" method="post">
        {% csrf_token %}
        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        </div>
        <input type="hidden" name="code" id="codeField">
        <input type="hidden" name="action" value="verify"> <div id="errorBox"></div>
        {% if form.errors %}
            <div class="error">{{ form.errors }}</div>
        {% endif %}
    </form>

    <div class="resend-block">
        <form method="post" id="resendForm">
            {% csrf_token %}
            <button type="submit" id="resendButton" name="action" value="send" disabled>
                Отправить код повторно
            </button>
        </form>
        <p id="timerText">
            Отправить код повторно через <span id="timer">60</span> сек
        </p>
    </div>
{% endif %}
<link rel="stylesheet" href="{% static 'css/verify.css' %}">
<script src="{% static 'js/verify.js' %}"></script>
