{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение почты</title>
    <link rel="stylesheet" href="{% static 'css/verify.css' %}">
</head>
<body>

<header>
    <div class="block1">
        <h2>BANANOSUBS</h2>
        <div class="header-link">
            <a href="{% url 'main:home' %}" class="button1">Главная</a>
            <a href="{% url 'main:analytics' %}" class="button2">Аналитика</a>
            <a href="{% url 'main:forecast' %}" class="button3">Прогноз</a>
        </div>
        <a href="{% url 'auth:login' %}" class="registr">Регистрация | Вход</a>
    </div>
       <div class="line" style="border-bottom: solid 1px #e3e3e3;"></div>
</header>

<div class="verify-container">
    <div class="verify-card">
        <img src="{% static 'img/mail.png' %}" class="mail-icon">
        <h1>Введите код</h1>
{#        <p class="email-text">#}
{#            Придёт на почту<br>#}
{#            {{ email }}#}
{#        </p>#}
        <form method="post" id="verifyForm">
            {% csrf_token %}
            <div class="code-inputs">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" autocomplete="off">
            </div>
            <input type="hidden" name="code" id="codeField">
            </form>
        <div class="resend-block">
        <p id="timerText">Отправить код повторно через <span id="timer">60</span> сек</p>
        <form method="post" id="resendForm">
            {% csrf_token %}
            <button type="submit" id="resendButton" name="action" value="send" disabled class="resend-btn-styled">
                Отправить код повторно
            </button>
        </form>
    </div>
    </div>
</div>

<script src="{% static 'js/verify.js' %}"></script>
</body>
</html>
