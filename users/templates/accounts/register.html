<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BANANOSUBS - Регистрация</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>
<body>

<header>
    <div class="block1">
        <h2>BANANOSUBS</h2>
        <div class="header-link">
            <a href="{% url 'main:home' %}" class="button1">Главная</a>
            <a href="{% url 'main:analytics' %}" class="button2">Аналитика</a>
            <a href="{% url 'main:forecast' %}" class="button3">Прогноз</a>
        </div>
        <a href="{% url 'auth:login' %}" class="registr">Регистрация | Вход</a>
    </div>
       <div class="line" style="border-bottom: solid 1px #e3e3e3;"></div>
</header>

<div class="login-wrapper">
    <div class="login-card">
        <h1>Регистрация</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">
                            {% for error in field.errors %}
                                <p>{{ error }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="buttons">
                <button type="submit" class="btn-login">
                    Зарегистрироваться
                </button>
                <a href="{% url 'auth:login' %}" class="btn-register-link">
                    <button class="btn-register" type="button">
                        Вход
                    </button>
                </a>
        </form>
    </div>
</div>

</body>
</html>
