<h2>Регистрация</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div>
            {{ field.label_tag }}<br>
            {{ field }}
            {% if field.errors %}<span style="color: red;">{{ field.errors }}</span>{% endif %}
            {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
        </div>
    {% endfor %}
    <button type="submit">Продолжить</button>
</form>
