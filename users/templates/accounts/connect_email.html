<h2>Подключить {{ provider|title }} почту</h2>

<p>
Почта будет подключена для аккаунта:
<b>{{ request.user.email }}</b>
</p>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
{% csrf_token %}

<label>Пароль приложения</label>
<input type="password" name="password" required>

<br><br>

<button type="submit">
Подключить почту
</button>

</form>
