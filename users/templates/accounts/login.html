<h2>Вход</h2>

<form method="post">

{% csrf_token %}

{% for field in form %}

<div class="form-group">

<label>{{ field.label }}</label>

{{ field }}

{% if field.errors %}
<div class="error">
{% for error in field.errors %}
<p>{{ error }}</p>
{% endfor %}
</div>
{% endif %}

</div>

{% endfor %}

<button type="submit">
Войти
</button>

</form>

<a href="{% url 'auth:register' %}">
Регистрация
</a>

<br>

<a href="{% url 'auth:forgot_password' %}">
Забыли пароль?
</a>


<style>

.form-group{
margin-bottom:15px;
}

input{
width:250px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.error{
color:red;
font-size:14px;
}

button{
padding:10px 20px;
background:#4CAF50;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
