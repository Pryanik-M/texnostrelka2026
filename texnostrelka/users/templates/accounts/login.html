<h2>Вход</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div>
            {{ field }}
            {% if field.errors %}
                <ul style="color: red;">
                    {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                </ul>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit">Войти</button>
</form>
<a href="{% url 'auth:register' %}">Регистрация</a>
<a href="{% url 'auth:forgot_password' %}">Забыли пароль?</a>
