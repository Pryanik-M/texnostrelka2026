<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Добавить подписку</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.field{
margin-bottom:15px;
}

input, select, textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.error{
color:red;
font-size:14px;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div class="container">

<h2>
{% if edit_sub %}
Редактировать подписку
{% else %}
Добавить подписку
{% endif %}
</h2>

<form method="post">

{% csrf_token %}

{% if edit_sub %}
<input type="hidden" name="old_id" value="{{ edit_sub.id }}">
{% endif %}

{% for field in form %}

<div class="field">

<label>{{ field.label }}</label>

{{ field }}

{% if field.errors %}
<div class="error">
{% for error in field.errors %}
<p>{{ error }}</p>
{% endfor %}
</div>
{% endif %}

</div>

{% endfor %}

<button type="submit">

{% if edit_sub %}
Сохранить изменения
{% else %}
Добавить подписку
{% endif %}

</button>

</form>

</div>

</body>
</html>
