<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Добавить подписку</h2>

<form method="post">

{% csrf_token %}

{% for field in form %}

<div>

<label>{{ field.label }}</label>

<br>

{{ field }}

{% if field.errors %}
<p style="color:red">
{{ field.errors }}
</p>
{% endif %}

</div>

<br>

{% endfor %}

<button type="submit">
Добавить
</button>

</form>
</body>
</html>
