<h2>Создать подписку</h2>

<p><b>Отправитель:</b> {{ candidate.sender }}</p>
<p><b>Тема:</b> {{ candidate.subject }}</p>

<form method="post">

{% csrf_token %}

{% for field in form %}

<div class="field">

<label>{{ field.label }}</label>

{{ field }}

{% if field.errors %}
<div style="color:red">
{% for error in field.errors %}
<p>{{ error }}</p>
{% endfor %}
</div>
{% endif %}

</div>

{% endfor %}

<button type="submit">
Сохранить подписку
</button>

</form>
